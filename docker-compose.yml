version: "3.9"

services:

  # ── Redis (broker + result backend) ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: celery_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
