version: "3.9"

services:

  # ── Redis (broker + result backend) ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: celery_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Flask API ───────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: celery_api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      REDIS_URL: redis://redis:6379/0
      FLASK_DEBUG: "false"
      FLASK_SECRET_KEY: "change-me-in-production"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  # ── Celery Worker — default queue ───────────────────────────────────────────
  worker_default:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: celery_worker_default
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379/0
      QUEUE: default
      WORKER_CONCURRENCY: 4
      LOG_LEVEL: INFO
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: bash scripts/start_worker.sh default 4

  # ── Celery Worker — high_priority queue ─────────────────────────────────────
  worker_high_priority:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: celery_worker_high_priority
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379/0
      QUEUE: high_priority
      WORKER_CONCURRENCY: 2
      LOG_LEVEL: INFO
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: bash scripts/start_worker.sh high_priority 2

  # ── Celery Worker — io_tasks queue ──────────────────────────────────────────
  worker_io:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: celery_worker_io
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379/0
      QUEUE: io_tasks
      WORKER_CONCURRENCY: 8
      LOG_LEVEL: INFO
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: bash scripts/start_worker.sh io_tasks 8

  # ── Flower Dashboard ────────────────────────────────────────────────────────
  flower:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: celery_flower
    restart: unless-stopped
    ports:
      - "5555:5555"
    environment:
      REDIS_URL: redis://redis:6379/0
      FLOWER_PORT: 5555
      FLOWER_BASIC_AUTH: "admin:secret"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - flower_data:/app/monitoring
    command: bash scripts/start_flower.sh

volumes:
  redis_data:
  flower_data:
