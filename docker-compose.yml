version: "3.9"

services:

  # ── Redis (broker + result backend) ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: celery_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Flask API ───────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: celery_api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      REDIS_URL: redis://redis:6379/0
      FLASK_DEBUG: "false"
      FLASK_SECRET_KEY: "change-me-in-production"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  # ── Celery Worker — default queue ───────────────────────────────────────────
  worker_default:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: celery_worker_default
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379/0
      QUEUE: default
      WORKER_CONCURRENCY: 4
      LOG_LEVEL: INFO
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: bash scripts/start_worker.sh default 4

  
